# Local footprint spec overrides for SiFli packages.
#
# This file is consumed by src/kicad_generator/footprint_loader.py and passed into
# the upstream kicad-footprint-generator no-lead generator.
#
# Baseline spec copied from:
#   kicad-footprint-generator/data/package/no_lead/qfn-6x.yaml
#
schema_version: 1
units: mm

defaults:
  library: Package_DFN_QFN

packages:
  - name: QFN-68-1EP_7x7mm_P0.35mm_EP5.49x5.49mm
    description: "Used by SF32LB52x and SF32LB52_X"
    size_source: "https://downloads.sifli.com/user%20manual/DS5201-SF32LB52x-%E8%8A%AF%E7%89%87%E6%8A%80%E6%9C%AF%E8%A7%84%E6%A0%BC%E4%B9%A6%20V2p5p3.pdf"
    device_type: "QFN"
    ipc_class: "qfn_pull_back"
    body_size_x:
      nominal: 7
      tolerance: 0.1
    body_size_y:
      nominal: 7
      tolerance: 0.1
    overall_height:
      minimum: 0.85
      nominal: 0.9
      maximum: 0.95
    num_pins_x: 17
    num_pins_y: 17
    pitch: 0.35
    lead_width:
      minimum: 0.10
      nominal: 0.15
      maximum: 0.20
    lead_len:
      minimum: 0.35
      nominal: 0.40
      maximum: 0.45
    EP_size_x:
      minimum: 5.39
      nominal: 5.49
      maximum: 5.59
    EP_size_y:
      minimum: 5.39
      nominal: 5.49
      maximum: 5.59
    EP_num_paste_pads: [3, 3]
    thermal_vias:
      count: [4, 4]
      drill: 0.2
      EP_paste_coverage: 0.6
      paste_via_clearance: 0.1
